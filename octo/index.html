<style>
/*GAMEFONT*/@font-face{font-family:'PixelifySans';font-style:normal;font-weight:400;font-display:swap;src:url(./fonts/PixelifySans.woff2) format('woff2');}@font-face{font-family:'Jua';font-style:normal;font-weight:400;font-display:swap;src:url(./fonts/Jua.woff2) format('woff2');}@font-face{font-family:'BlackHanSans';font-style:normal;font-weight:400;font-display:swap;src:url(./fonts/BlackHanSans.woff2) format('woff2');}
/*TITANONE-PREVIEW*/@font-face{font-family:'TitanOne';font-style:normal;font-weight:400;font-display:swap;src:url(./fonts/TitanOne.ttf) format('truetype');}
body,button,input,select,textarea{font-family:'TitanOne','Jua','Apple SD Gothic Neo',system-ui,sans-serif;}

  /* GameReels UI 배치 규정(2026-06-19) — 기존 '전체 상단 12% 밀기' 폐기:
     ① 노치 영역엔 모든 UI 금지 → 상단 UI 를 노치 아래로(--safe-top 노치 reserve, 호스트가 env=0 으로 보고하므로 고정 폴백).
     ② 정보 표시 UI(코인·레벨, 비클릭)는 '좌측 상단' 금지 → 코인 pill 을 우측 정렬로 이동.
     ③ 클릭 UI 는 상단 12% 금지 → 릴스(solo) 빌드는 기어(#settings-btn)/테스터/스테이지 화살표 전부 제거 → 상단 클릭요소 0.
     로비 iframe·APK 는 미적용(:root 기본 env 유지) → 무회귀. */
  /* 정보 UI(코인=좌측·레벨=중앙, 둘 다 비클릭)는 '노치만' 회피 + 최대한 위로. 코인은 원래 좌측 위치/룩 그대로.
     · #hud-top 의 에디터 베이크(아래로 ~39px 이동, 로비 튜닝)를 릴스에선 무력화 → HUD 를 화면 최상단으로 끌어올림.
     · --safe-top = max(env, 48px) 노치 reserve 만큼만 내림 → 코인·레벨이 노치/다이내믹아일랜드(≈59px) 바로 아래. */
  body.solo, body.gamereels { --safe-top: max(env(safe-area-inset-top, 0px), 52px); }
  body.reels { --safe-top: 0px !important; }   /* 릴스 호스트(?reels|?gamereels): 상단 여백 제거 — 게임플레이 위쪽 여백 금지 */
  body.solo #hud-top, body.gamereels #hud-top { transform: none !important; }
  /* ★ 릴스 호스트: 좌상단 뒤로가기/우상단 메뉴 버튼과 겹치지 않게 코인·레벨·설정 HUD 만 아래로(게임플레이 캔버스는 풀스크린이라 여백 무영향). 2026-06-23 사용자 요청. */
  body.reels #hud-top { padding-top: 90px !important; }
  body.reels .level-label { top: 96px !important; }
  body.reels #settings-btn { top: 92px !important; }

  /* ════════════════════════════════════════════════════════════════════
     ★ REELS MODE HIDE (게임릴스용 — 2026-06-30) — 삭제 아닌 숨김(복원 쉬움).
     게임릴스(IS_SOLO/__SOLO=true 빌드 = body.solo) 에서만 적용:
       ① 재화 UI(코인 pill·상점/구매 팝업)  ② 인게임 아이템(부스터) 버튼
       ③ 게임오버 '이어하기(Continue)'·닫기(X) → Restart(재시작)만 노출
     로비 iframe(puzzle.html, .solo 없음)·APK·에디터엔 영향 0(스코프=body.solo).
     ┌─ 복원법 ──────────────────────────────────────────────────────────┐
     │ 이 'REELS MODE HIDE' CSS 블록 전체 + 아래 ②③ JS 의 [REELS] 표시 │
     │ 라인(over-overlay 재시작화면 전환)을 삭제하면 원래대로 복구된다.  │
     │ (DOM/로직은 그대로 — display:none 으로만 가린 것이라 무손실.)    │
     └────────────────────────────────────────────────────────────────────┘ */
  /* ① 재화 UI: 코인 표시 pill 숨김 (#hud-top 자체는 LEVEL 라벨 유지 위해 남김) */
  body.solo .coin-pill { display:none !important; }
  /* ① '재화 부족' 토스트(Not enough coins) 숨김 */
  body.solo #coin-toast { display:none !important; }
  /* ②-a 아이템 구매(상점) 팝업 + 아이템 해금(NEW ITEM!) 팝업 숨김 — 떠도 안 보이게 */
  body.solo #item-buy-overlay,
  body.solo #item-unlock-overlay { display:none !important; }
  /* ②-b 아이템 '튜토리얼'(✨ NEW ITEM … Unlocked!) 팝업 숨김 — 새 아이템 첫 등장 안내 모달 */
  body.solo #tut-overlay { display:none !important; }
  /* ②-c 인게임 아이템(부스터/파워업) 버튼 줄 전체 숨김 (그 안의 +구매배지·가격라벨·LV 라벨 동반 숨김) */
  body.solo #powerups,
  body.solo #pu-tray { display:none !important; }
  /* ②-d 파워업 사용 힌트/배너(아이템 발동 안내 텍스트)도 함께 숨김 */
  body.solo #pu-hint { display:none !important; }
  /* ③ 게임오버: 이어하기(코인 Continue)·닫기(X) 숨김 */
  body.solo #over-continue,
  body.solo #over-close { display:none !important; }
  /* ③-b 게임오버 팝업의 '아이템(Spring 부스터) 효과 일러스트'(제목 아래 문어 아이콘 줄/도식) 숨김
         — continue_diagram 자산(#over-diagram-img) + 도식 폴백(#over-diagram-schematic) 모두 #over-diagram 안. Continue 아이템과 한 묶음이라 함께 가린다. */
  body.solo #over-diagram { display:none !important; }
  /* ③-c Restart 버튼(박스) 숨김 — 릴스에선 별도 버튼 없이 '화면 아무 데나 탭'으로 재시작(아래 #over-overlay 전체가 탭 영역). */
  body.solo #over-retry { display:none !important; }
  /* ═══ ③-d 게임오버 = '팝업 박스' → '딤 전체화면 + 텍스트'(2026-06-30 사용자) ═══
     릴스(body.solo)에선 카드/박스(배경·테두리·그림자) 전부 제거하고, 화면 전체를 어둡게
     한 딤 오버레이 위에 큰 "GAME OVER" + (사유) + "Tap to Restart" 텍스트만 띄운다.
     #over-overlay 전체가 탭 영역(JS 가 오버레이에 탭→retryStage 핸들러를 붙임). */
  /* 딤: 더 진하게(박스가 없으니 텍스트 가독성 위해) + 탭 받게 pointer 커서 */
  body.solo #over-overlay { background:rgba(6,16,34,.86) !important; cursor:pointer; }
  /* 카드: 박스 스타일(배경·테두리·그림자·패딩·고정폭) 전부 제거 → 투명 텍스트 컨테이너 */
  body.solo #over-card {
    background:none !important; border:none !important; box-shadow:none !important;
    width:auto !important; max-width:88% !important; padding:0 !important;
    text-align:center; pointer-events:none; }   /* 탭은 오버레이가 받음(자식은 통과) */
  /* 보상 배너(있다면)도 박스라 숨김 */
  body.solo #over-banner { display:none !important; }
  /* "GAME OVER" 큰 텍스트 */
  body.solo #over-title { font-size:46px !important; margin:0 0 18px !important;
    color:#fff !important; letter-spacing:1px;
    text-shadow:0 0 18px rgba(120,180,255,.5), 0 4px 0 rgba(10,28,60,.85), 0 6px 12px rgba(0,0,0,.5) !important; }
  /* 사유 텍스트(한 줄) — 비어있으면 JS 가 display:none 처리 */
  body.solo #over-desc { font-size:18px !important; color:#dbe7ff !important;
    margin:0 0 26px !important; padding:0 8px !important; line-height:1.4 !important; }
  /* "Tap to Restart" 안내(JS 가 솔로일 때 #over-desc 뒤에 #over-tap-hint 를 주입) */
  body.solo #over-tap-hint { display:block; font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif;
    font-size:22px; font-weight:400; color:#9fd0ff; letter-spacing:.5px;
    text-shadow:0 2px 0 rgba(10,28,60,.7); animation:overTapPulse 1.3s ease-in-out infinite; }
  @keyframes overTapPulse { 0%,100%{opacity:.55;} 50%{opacity:1;} }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent;
      font-family: inherit;   /* 모든 요소가 body의 귀여운 라운드 폰트 상속 */
  }
  /* 게임풍 텍스트 아웃라인: paint-order로 stroke를 fill 뒤에 → 채움은 또렷, 외곽만 두껍게.
     .go = 진한 네이비 외곽(흰/밝은 텍스트용), .go-brown = 갈색 외곽(코인 등) */
  .go {
    -webkit-text-stroke: 4px #213a5e; paint-order: stroke fill;
    text-shadow: 0 3px 0 rgba(0,0,0,.28);
  }
  .go-brown {
    -webkit-text-stroke: 4px #7a4a12; paint-order: stroke fill;
    text-shadow: 0 2px 0 rgba(0,0,0,.22);
  }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--asset-background, #1b2c42);   /* body 도 동일 풀뷰포트 배경 → #fit-root 와 이음새 0(레터박스/띠 방지) */
    /* 청키 라운드 게임 폰트 스택: 굵은 라운드 시스템 폰트 우선(Arial Rounded MT Bold 등) → 폴백 */
    font-family: 'TitanOne', 'Arial Rounded MT Bold', 'Baloo 2', 'Fredoka One', 'Chango', 'Avenir Next Rounded', 'SF Pro Rounded', 'Hiragino Maru Gothic ProN', 'Apple SD Gothic Neo', 'Nanum Gothic', system-ui, sans-serif;
    font-weight:900;            /* 기본 굵게 */
    user-select: none; -webkit-user-select: none; touch-action: none;
    /* ★꾹누름(롱프레스) 콜아웃 차단 — iOS 돋보기(루페)·텍스트 선택/복사 토글 안 뜨게(릴스앱 웹뷰 공통). */
    -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
  }
  /* 게임 화면 전 요소에 콜아웃/선택 차단(캔버스·HUD 포함). 인풋 없음 → 부작용 0. */
  * { -webkit-touch-callout: none !important; -webkit-user-select: none; user-select: none; }
  #fit-root {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    /* 배경을 전체 뷰포트(fit-root)에 깔아 레터/필러박스 여백까지 채움 → 로비처럼 좌우 가득. 게임은 390×844 박스로 중앙 fit(좌표 정확). */
    background: var(--asset-background, linear-gradient(180deg,#11457f 0%,#1c5da3 48%,#2a72bf 100%));
    /* ⚠️ position:fixed HUD/오버레이(#hud-top·#settings-btn·overlays)를 '뷰포트'가 아닌 'fit-root(기기박스)' 기준으로 가두기 위한 containing block.
       실기기(box=viewport)에선 무변화, 기기 해상도 프리뷰(box<window)에서 코인/설정/레벨 UI가 박스 밖으로 새던 버그 수정. */
    transform: translateZ(0);
  }
  /* 제작화면 배경 = 인게임 배경(밤하늘) — 사용자 요청. (#fit-root 기본값과 동일하게 in-game bg 사용) */
  body.making #fit-root { background: var(--asset-background, linear-gradient(180deg,#11457f 0%,#1c5da3 48%,#2a72bf 100%)); }
  /* 제작화면: #fit-root 직속(z높음) HUD + 박스 안 인게임 플레이 UI(파워업·슬롯·문어수)를 숨김 — 투명 오버레이로 비쳐보이던 것 제거(중앙 프레임선 포함) */
  body.making #hud-top, body.making #settings-btn, body.making #powerups, body.making #pu-tray, body.making #octo-nums, body.making #queue-row, body.making #slots-row, body.making #slot-extra, body.making #gl-canvas, body.making #gl-canvas-hi { display:none !important; }
  #game-container {
    position: relative;
    width: 390px; height: 844px;
    flex: 0 0 auto;        /* flex 아이템 축소 금지 — 좁은 뷰포트에서도 390×844 디자인공간 보존(fit은 transform:scale이 담당). 이게 없으면 width만 줄어 캔버스/숫자 좌표 불일치(해상도 의존 드리프트) */
    transform: scale(var(--game-scale, 1));
    transform-origin: center center;
    overflow: hidden;
    background: transparent;   /* 배경은 #fit-root(전체 뷰포트)가 담당 — 여기는 투명(알파 캔버스로 #fit-root 배경이 비침) */
  }
  #gl-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  /* ---- Top HUD ---- */
  /* #hud-top 은 #fit-root 의 직속 자식(게임박스 밖) → 전체 뷰포트 폭에 고정.
     코인=화면 좌측 끝, 설정기어=화면 우측 끝(safe-area 여백만). 게임박스 transform/overflow 영향 없음. */
  #hud-top {
    position: fixed; top: 0;
    left: var(--safe-left); right: var(--safe-right);
    padding: calc(12px + var(--safe-top)) 14px 6px 14px;
    display: flex; align-items: center; justify-content: space-between;
    pointer-events: none; z-index: 120;
  }
  /* ── 코인 pill: [FIX4] 로비(lobby_hud.mjs)와 동일 토이 캡슐 프레임 + 동일 padding/min-width.
     숫자가 토이 프레임의 어두운 중앙 패널 안에 들어오게(로비 FIX1 과 1:1). ── */
  /* [TOY-UI v2] 재화표시부 = 로비와 동일: 왼쪽 큰 코인(바보다 큼·튀어나옴) + 단색 크림 짧은 바(색나눔 없음) + 갈색 숫자. (레퍼런스 IMG_2882) */
  .coin-pill {
    position:relative; display:inline-flex; align-items:center; height:50px;
    padding:0 16px 0 0; min-width:150px;
    font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-weight:400; font-size:23px;
    color:#6e4f1f; letter-spacing:.3px;
    text-shadow:0 1px 0 rgba(255,255,255,.55);
  }
  .coin-pill::before { content:none; }
  /* 숫자 배경 = 단색 크림 캡슐(원색·색나눔 없음), 아이콘보다 세로로 짧음(top/bottom 6px). 왼쪽 18px 부터 → 큰 코인이 좌측을 덮음. */
  .coin-bg { position:absolute; left:12px; right:0; top:7px; bottom:7px; z-index:0; transform-origin:center center;
    background:#f3e8d0; border-radius:999px; border:2px solid #e4d4b2;
    box-shadow:0 3px 4px rgba(90,60,15,.30), inset 0 2px 0 rgba(255,255,255,.78), inset 0 -2px 3px rgba(190,150,90,.22); }
  /* coin-icon: 골드코인 아이콘 — 크게(40px, 바보다 큼) */
  /* ★ filter:drop-shadow 제거(사용자 요청): iOS Safari 에서 이 그림자 레이어가 50px 박스를 '투명 사각 테두리'로 래스터해 보였음. 코인 음영은 webp 에 내장돼 그림자 없어도 입체감 유지. */
  .coin-icon { position:relative; z-index:2; flex:0 0 auto; width:50px; height:50px; border-radius:0;
    background:var(--coin-pixel, var(--coin-icon, radial-gradient(circle at 35% 30%, #ffe08a, #f5b417 70%, #d68f00))) center/contain no-repeat; }
  .coin-icon::after { content:none; }
  #coin-amount { position:relative; z-index:2; line-height:1; margin-left:9px; }
  /* ── LEVEL 표시: 원본처럼 평범한 흰색 볼드 텍스트(칩/배너 제거) ── */
  .level-label {
    position:absolute; left:50%; top:calc(18px + var(--safe-top)); transform:translateX(-50%);
    display:inline-flex; align-items:center; justify-content:center;
    font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-weight:400; font-size:21px; letter-spacing:1px;
    color:#fff; text-shadow:0 2px 0 rgba(7,24,55,.5), 0 3px 6px rgba(0,0,0,.32);
    white-space:nowrap;
  }
  .level-label::before { content:none; }
  /* 🧪 스테이지 좌우 화살표(테스트 모드 전용; JS가 display 켬). 라벨 '중앙 기준 ±고정 오프셋'이라 LEVEL 길이/스테이지명과 무관하게 항상 같은 위치.
     기본위치 = LEVEL 라벨(top 18px)과 같은 높이로 라벨을 좌우로 깔끔히 감싼다(라벨 양옆 ±66px). 에디터 data-edit-id 로 위치/크기 조절 가능. */
  .stage-nav{ position:absolute; top:calc(17px + var(--safe-top)); width:28px; height:28px;
    display:none; align-items:center; justify-content:center; pointer-events:auto; z-index:121;
    background:rgba(8,20,42,0.45); border:none; border-radius:8px; color:#fff; cursor:pointer;
    font:700 13px/1 'TitanOne','PixelifySans','Jua',sans-serif; padding:0; text-shadow:0 1px 2px rgba(0,0,0,.45);
    -webkit-tap-highlight-color:transparent; }
  .stage-nav:active{ opacity:.55; }
  #stage-prev{ left:calc(50% - 66px); transform:translateX(-50%); }
  #stage-next{ left:calc(50% + 66px); transform:translateX(-50%); }
  /* [TOY-UI] 설정 기어 = 로비(lobby_hud.mjs settings-btn)와 동일한 토이 라운드 버튼.
     크림 라운드 버튼(radial 크림 그라데이션 + 흰 테두리 + 부드러운 3D 그림자) + ::before 토이 기어(var(--toy-gear)).
     #fit-root 직속 → 화면 우측 끝(safe-area 여백)에 고정. backdrop-filter 미사용(라이브 WebGL 위 blur 프레임드랍 방지). */
  #settings-btn {
    position:fixed; top:calc(14px + var(--safe-top)); right:calc(14px + var(--safe-right));
    width:50px; height:50px; border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #fffdf6 0%, #fdf2da 62%, #f4e4bf 100%);
    border:2px solid rgba(255,255,255,.85);
    box-shadow:0 4px 0 rgba(176,140,86,.45), 0 7px 11px rgba(90,64,28,.28), inset 0 2px 0 rgba(255,255,255,.9);
    cursor:pointer; z-index:121; padding:0;
    display:flex; align-items:center; justify-content:center;
    pointer-events:auto; transform-origin:center center;
  }
  /* 토이 기어 아이콘 — 버튼 위에 ::before 로 얹어 항상 또렷(배경 합성 영향 X). 로비와 동일 34px. */
  #settings-btn::before { content:""; position:absolute; inset:0; margin:auto;
    width:34px; height:34px; background:var(--toy-gear) center/contain no-repeat;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.25)); }
  #settings-btn svg { display:none; }   /* SVG 기어 숨김 — 토이 기어 이미지(::before) 사용 */
  #settings-btn:active { transform:translateY(3px); box-shadow:0 1px 0 rgba(176,140,86,.45), 0 3px 6px rgba(90,64,28,.26), inset 0 2px 0 rgba(255,255,255,.9); }
  .gear { width:38px; height:38px; border-radius:11px; background:#2f7ef0;
    box-shadow:0 3px 0 #1f5fc0, inset 0 2px 2px rgba(255,255,255,.3); pointer-events:auto;
    display:flex; align-items:center; justify-content:center; font-size:20px; color:#fff; }
  /* ===== 🧪 TESTER (DEV-ONLY) — __TEST_INFINITE_PU 일 때만 JS가 display:flex 로 켠다 ===== */
  /* 평소 display:none. 작은 코너 버튼(설정 기어 바로 아래)이라 일반 릴리스 화면을 어지럽히지 않는다. */
  #tester-btn {
    position:fixed; top:calc(124px + var(--safe-top)); right:calc(14px + var(--safe-right));
    width:42px; height:42px; border-radius:50%;
    background:rgba(20,24,40,0.62); border:2px solid rgba(120,220,160,.55);
    box-shadow:0 3px 0 rgba(20,60,40,.5), 0 5px 8px rgba(0,0,0,.3);
    cursor:pointer; z-index:121; padding:0; display:none;
    align-items:center; justify-content:center; font-size:20px; line-height:1; pointer-events:auto;
  }
  #tester-btn:active { transform:translateY(2px); }
  #tester-overlay { position:fixed; inset:0; z-index:240; display:none; background:rgba(6,12,24,0.7); }
  #tester-overlay.show { display:flex; align-items:center; justify-content:center; }
  .tester-card { width:288px; max-height:78vh; overflow-y:auto; padding:20px 18px 18px;
    background:#161b2c; border:3px solid #2f7ef0; border-radius:16px;
    box-shadow:0 10px 28px rgba(0,0,0,.5); color:#e8eeff; font-family:'TitanOne','PixelifySans','Jua',sans-serif; }
  .tester-title { font-size:22px; text-align:center; margin-bottom:4px; letter-spacing:.5px; }
  .tester-sub { font-size:12px; text-align:center; color:#9fb2d8; margin-bottom:14px; }
  .tester-btn-row { display:block; width:100%; padding:13px 12px; margin-bottom:9px; border:none;
    border-radius:11px; font-family:inherit; font-size:16px; text-align:left; cursor:pointer;
    background:#28406e; color:#fff; box-shadow:0 3px 0 #18294a; }
  .tester-btn-row:active { transform:translateY(2px); box-shadow:0 1px 0 #18294a; }
  .tester-btn-row .t-tag { float:right; font-size:11px; opacity:.8; }
  .tester-btn-row.t-normal { background:#3cc451; box-shadow:0 3px 0 #279a3a; }
  .tester-btn-row.t-soon { background:#34384a; color:#7d86a0; box-shadow:0 3px 0 #23263a; cursor:not-allowed; }
  .tester-close { display:block; width:100%; padding:11px; margin-top:6px; border:none; border-radius:11px;
    font-family:inherit; font-size:15px; cursor:pointer; background:#42485e; color:#cdd6ee; }
  /* ===== ✨ NEW ITEM 튜토리얼 팝업 ===== (#fit-root 직속 → 딤이 전체 뷰포트, 팝업 중앙) */
  #tut-overlay { position:fixed; inset:0; z-index:250; display:none; flex-direction:column;
    align-items:center; justify-content:center; background:rgba(6,11,22,0.82);

  #tut-overlay.show { display:flex; animation:tutFadeIn .25s ease-out; }
  @keyframes tutFadeIn { from{ opacity:0; } to{ opacity:1; } }

  /* 어두운 라운드 카드(레퍼런스: 다크 카드에 기믹 비주얼). pix-card 톤 위에 다크 그라데이션으로 override. */
  #tut-card { width:280px; padding:20px 20px 22px;
    background:linear-gradient(180deg,#27324a 0%,#1a2236 100%);
    border:4px solid #0c1424; }
  #tut-visual { position:relative; width:230px; height:230px; margin:0 auto 14px; border-radius:16px;
    background:radial-gradient(circle at 50% 38%, #324063 0%, #1a2238 72%, #131a2c 100%);
    border:3px solid #0c1424; box-shadow:inset 0 4px 14px rgba(0,0,0,.45);
    display:flex; align-items:center; justify-content:center; overflow:hidden; }
  #tut-canvas { width:200px; height:200px; image-rendering:auto; }
  /* 기믹별 짧은 루프 동영상(webm). 보이면 정적 캔버스 위에 덮어 모션 데모 재생. 미존재/미지원이면 숨겨져 캔버스 폴백. */
  #tut-vid { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:13px;
    display:none; background:transparent; pointer-events:none; }
  #tut-visual.has-vid #tut-canvas { visibility:hidden; }
  #tut-visual.has-vid #tut-vid { display:block; }
  /* 배포 3종(linked/mystery/frozen) 카툰 일러스트. object-fit:contain 으로 4:3(mystery)도 정사각 카드에 깔끔히. */
  #tut-ill { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; padding:6px;
    display:none; background:transparent; pointer-events:none; image-rendering:auto; }
  #tut-visual.has-ill #tut-canvas { visibility:hidden; }

  #tut-name { font-size:24px; color:#fff; letter-spacing:.5px; margin-bottom:7px;
    text-shadow:0 3px 0 #0c1f40, 0 4px 6px rgba(0,0,0,.4); }
  #tut-name .tut-unlocked { color:#5fdc4f; }
  #tut-desc { font-size:15px; line-height:1.35; color:#c4d2ee; padding:0 4px; min-height:20px; }

    text-shadow:0 2px 0 #0c1f40; animation:tutBlink 1.1s ease-in-out infinite; }
  @keyframes tutBlink { 0%,100%{ opacity:.45; } 50%{ opacity:1; } }
  /* ===== 설정 팝업 ===== (#fit-root 직속 → 딤이 전체 뷰포트를 덮음, 팝업은 화면 중앙) */
  /* ===== 공용 픽셀 팝업 스타일 (settings / pu / over 통일) =====
     게임 딥블루 테마에 맞춘 픽셀 프레임: 두꺼운 단색 테두리 + 하드 오프셋 그림자(블러/글로시 X = 픽셀 느낌) + 픽셀 폰트. */
  .pix-card {

    background:linear-gradient(180deg,#1c3c6e 0%,#15305a 100%);
    border:4px solid #0d1f3e; border-radius:18px;
    box-shadow:0 7px 0 #0a1830, 0 12px 22px rgba(0,0,0,.45), inset 0 3px 0 rgba(120,165,235,.35), inset 0 -4px 0 rgba(8,20,44,.5);

  }
  .pix-title { font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; color:#fff; letter-spacing:.5px;

  /* 공용 닫기 버튼: close_btn.webp 이미지(--close-bg) 단일 스타일 — 모든 팝업 동일 룩 */
  .pix-close { position:absolute; top:-16px; right:-14px; width:46px; height:46px; border:none; padding:0; cursor:pointer;

    filter:drop-shadow(0 3px 4px rgba(0,0,0,.4)); }

  /* 공용 1차 버튼: 초록 픽셀 버튼(플랫 + 두꺼운 테두리 + 하드 그림자) */
  .pix-btn { font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; color:#111315; cursor:pointer;
    background:#91F55B;
    border:4px solid #91F55B; border-radius:14px;
    box-shadow:0 6px 0 rgba(0,0,0,.45), 0 9px 14px rgba(0,0,0,.32);
    text-shadow:none; }
  .pix-btn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.45), 0 4px 8px rgba(0,0,0,.3); }

  #settings-overlay { position:fixed; inset:0; z-index:200; display:none; background:rgba(6,12,24,0.62); }
  #settings-overlay.show { display:flex; align-items:center; justify-content:center; }
  /* 픽셀 프레임 패널(.pix-card 상속) */
  .settings-card { width:252px; padding:24px 20px 20px; }

  .settings-row { display:flex; align-items:center; justify-content:space-between;

  .settings-label { font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-size:18px; color:#e8eeff; letter-spacing:.5px; }
  /* 임시(DEV) 토글 행 — 관리자 전용(사용자 신고 #7). 기본 숨김; 관리자(?dev/?admin)일 때만 JS가 켠다. */
  /* ★ Test(DEV) 토글: 설정에서 누구나 켜고 끌 수 있게 항상 노출(사용자 요청). 기본 OFF 라 평소엔 테스터/레벨선택 안 보임. */

  /* 옥토퍼스(대포) 카운트: 원본처럼 큐브 스택 위 흰 숫자만(배경/펠릿 제거) */
  .octo-num { position:absolute; transform:translate(-50%,-50%); display:none;
    align-items:center; justify-content:center; min-width:0; height:auto; padding:0;
    font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-weight:400; font-size:18px; line-height:1; color:#fff;
    background:none; border:none; border-radius:0; box-shadow:none;
    text-shadow:0 2px 0 rgba(0,0,0,.4), 0 0 4px rgba(0,0,0,.45); }
  .octo-num.qnum { font-size:16px; }
  /* 큐 뒤 2줄(대기열) 숫자: 흐리게(반투명 회색) — 다음 차례(윗줄)와 시각적으로 구분 */
  .octo-num.qnum.qdim { font-size:14px; color:rgba(214,222,234,.55);
    text-shadow:0 1px 0 rgba(0,0,0,.30), 0 0 3px rgba(0,0,0,.30); }
  /* 🧊 FROZEN(look v4): 녹는 횟수(meltCount)는 평소 옥토 카운트와 '동일한' 흰 숫자(.qnum)로 표시(레퍼런스 IMG_2772).
     옛 얼음색 칩 스타일(qfrost)은 폐기 — JS 가 클래스를 더 이상 추가하지 않으며, 혹시 남아있으면 제거한다. */
  /* 숫자 글자(에디터 편집 대상). 부모(.octo-num)가 화면 위치/중심정렬을 맡고, 이 span 이 폰트/오프셋 오버라이드를 받음. */
  .octo-num-inner { display:inline-block; color:inherit; font:inherit; line-height:inherit; text-shadow:inherit; }

  /* ---- 스프링 파워업 6번째 슬롯(슬롯 row 바로 위, 맨 왼쪽 정렬, ~80% 크기) ---- */
  /* 위치(left/top)는 매 프레임 extraCannon 옥토퍼스의 투영 좌표로 JS가 동기화. 크기만 여기서 80%로 고정(37px=46*0.8). */
  #slot-extra, .slot-extra-cell {
    position:absolute; left:60px; bottom:320px;
    width:37px; height:37px; border-radius:10px;
    background:none;
    border:2px solid rgba(120,160,215,.5);
    box-shadow:none;
    display:none; z-index:-1; pointer-events:none; overflow:hidden;
  }
  #slot-extra.show, .slot-extra-cell.show { display:block; }
  /* ===== WARNING(5슬롯 풀 + 발사정지 1s) : 슬롯 빨강 점멸 ===== */
  @keyframes slotWarnBlink {
    0%,100% { border-color:rgba(255,70,70,.55); box-shadow:0 0 0 0 rgba(255,40,40,0), inset 0 0 8px 1px rgba(255,40,40,.12); }
    50%     { border-color:rgba(255,40,40,1);   box-shadow:0 0 14px 4px rgba(255,40,40,.7), inset 0 0 14px 3px rgba(255,40,40,.5); }
  }
  body.warning #slots-row .slot { animation:slotWarnBlink .56s ease-in-out infinite; border-width:3px; }
  body.warning #slot-extra, body.warning .slot-extra-cell { animation:slotWarnBlink .56s ease-in-out infinite; border-width:3px; }

  /* ---- 파워업 spotlight: 전체 dim + 위에 클릭 가능한 리소스만 올림 ---- */
  #dim-layer {
    position:absolute; inset:0; background:rgba(8,14,24,0.62);
    pointer-events:none; z-index:17; display:none;
  }
  #dim-layer.show { display:block; }
  /* 풀뷰포트 딤(레터박스 strip 포함 화면 전체). z:10 = #fit-root bg 위, #game-container(딤 중엔 z:20) 아래.
     → 박스 바깥은 이 딤이, 박스는 #dim-layer 가 같은 톤(0.62)으로 '연속' 덮어 경계 세로선이 없다(strip 분리·좌표맞춤 불필요). */
  #dim-strip {
    position:fixed; inset:0; background:rgba(8,14,24,0.62);
    pointer-events:none; z-index:10; display:none;
  }
  #dim-strip.show { display:block; }
  /* 하이라이트 캔버스(dim 위에 클릭 가능한 3D 객체만 다시 그려서 밝게 표시) */
  #gl-canvas-hi {
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none; z-index:18; display:none;
  }
  #gl-canvas-hi.show { display:block; }
  /* 스프링(extra) 모드: 슬롯 DOM 셀(frame)만 dim 위로 끌어올림. 큐는 건드리지 않음. */
  body.spotlight-slots #slots-row { z-index:19; }
  /* ⚠️ 슬롯 프레임에 어두운 채움(rgba(8,16,30,.85))을 주면 그 프레임(z-19)이 하이라이트 캔버스(z-18)를 덮어
     슬롯 문어의 몸통(프레임 안쪽)을 가린다 → 머리만 dim 위로 보이는 버그. 사용자 스펙: 슬롯 문어 '전체 몸통'이
     dim 위로 밝게 올라와야 한다. 채움을 투명으로 두어 하이라이트 캔버스의 밝은 문어 몸통이 프레임을 통해 비치게 한다
     (테두리 외곽선은 그대로 유지). 빈 슬롯은 뒤 dim 이 비쳐 어둡게 보이므로 별도 채움 불필요. */
  body.spotlight-slots #slots-row .slot { background:none; }
  /* 파워업 활성 시 옥토퍼스 카운트(숫자 DOM)를 dim 위로 끌어올려 몸과 함께 밝게 — 단 '하이라이트 대상' 의 숫자만.
     핵심: #octo-nums 컨테이너 전체에 z-index 를 주면 새 stacking context 가 생겨 슬롯+큐 숫자가 통째로 dim 위로 떠올라
     (스프링인데 큐 윗줄까지 밝아지는) 버그가 났다. 파워업 중에는 컨테이너를 z-index:auto 로 두어 stacking context 를
     만들지 않고(그냥 위치 컨테이너), 들어올릴 개별 숫자에만 z-index 를 줘 그 숫자만 dim(z17) 위로 올린다.
     z-index 없는(auto) 비대상 숫자는 dim 아래로 유지(어둡게). */
  body.puactive-magnet #octo-nums,
  body.puactive-wand   #octo-nums,
  body.puactive-hand   #octo-nums,
  body.puactive-shuffle #octo-nums,
  body.puactive-extra  #octo-nums { z-index:auto; }
  /* magnet/wand/hand/shuffle = 큐 옥토퍼스 선택/셔플 → 큐 숫자(.qnum)만 올림. 슬롯 숫자는 dim 아래 유지. */
  body.puactive-magnet #octo-nums .octo-num.qnum,
  body.puactive-wand   #octo-nums .octo-num.qnum,
  body.puactive-hand   #octo-nums .octo-num.qnum,
  body.puactive-shuffle #octo-nums .octo-num.qnum { z-index:19; }
  /* extra(스프링) = 슬롯 옥토퍼스 pop → 슬롯 숫자(:not(.qnum))만 올림. 큐 숫자/큐 윗줄은 dim 아래 유지. */
  body.puactive-extra  #octo-nums .octo-num:not(.qnum) { z-index:19; }
  body.puactive-rainbow #octo-nums { opacity:0; }   /* 대포 모드: 옥토퍼스 카운트 숨김(3D 커넥터는 updateLinkConnectors 에서 숨김) */
  /* MAGNET 활성 시: 큐 3줄 카운터를 전부 흰색으로(평소엔 윗줄=흰색, 아래 2줄=회색 qdim).
     자석은 큐 전체를 섞으므로 모든 줄이 동등하게 '대상'이라 전부 밝게(흰색) 표시. 모드 OFF 시
     body.puactive-magnet 가 제거되며 qdim 의 기본 회색으로 자동 복귀(JS 변경 불필요). */
  body.puactive-magnet #octo-nums .octo-num.qnum.qdim,
  body.puactive-hand   #octo-nums .octo-num.qnum.qdim,
  body.puactive-shuffle #octo-nums .octo-num.qnum.qdim { color:#fff;
    text-shadow:0 2px 0 rgba(0,0,0,.4), 0 0 4px rgba(0,0,0,.45); }

  /* ---- 파워업 사용 레이어 ---- */
  /* 배경 dim 없음, pointer-events:none → 큐/슬롯/큐브 탭이 캔버스로 통과.
     자식(배너/액션버튼/마스코트)만 pointer-events:auto. */
  #pu-overlay {
    /* #fit-root 직속(게임박스 밖)으로 이동 → 전체 뷰포트 기준 고정. 배너/버튼/마스코트가 화면 끝 기준으로 위치.
       z-index 는 이동된 다른 오버레이(clear z190 등)대와 동일 ~190-200 대. */
    position:fixed; inset:0; display:none; z-index:195;
    pointer-events:none;
  }
  #pu-overlay.show { display:block; }
  /* 상단 배너: CSS 그라데이션+라운드보더로 디자인 (border-image 9-slice의 가로선 artifact 회피).
     디자인: 외곽 파란 라운드 보더 + 가운데 흰색 영역 + close 버튼 우측 overhang */
  /* 파워업 배너 — 다른 팝업과 통일한 픽셀 프레임(딥블루 카드 + 두꺼운 단색 테두리 + 하드 그림자 + 픽셀 폰트). */
  #pu-overlay .pu-banner {
    position:absolute; top:calc(82px + var(--safe-top)); left:50%; transform:translateX(-50%);
    background:linear-gradient(180deg,#1c3c6e 0%,#15305a 100%);
    border:4px solid #0d1f3e;
    border-radius:18px;
    box-shadow:0 5px 0 #0a1830, 0 8px 18px rgba(0,0,0,.4), inset 0 3px 0 rgba(120,165,235,.35), inset 0 -4px 0 rgba(8,20,44,.5);
    box-sizing:border-box;
    max-width:92%;
    padding:11px 30px;
    overflow:visible; pointer-events:auto;
    white-space:nowrap;
  }
  #pu-overlay .pu-banner-text {
    padding:2px 0;
    font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif;
    font-weight:400; font-size:20px; color:#fff; text-align:center;
    letter-spacing:0.5px; text-shadow:0 2px 0 #0c1f40, 0 3px 5px rgba(0,0,0,.45);
    white-space:nowrap;
  }
  /* 닫기 버튼: 공용 .pix-close 와 동일 룩(close_btn.webp 이미지). 배너에 붙이지 않고 '팝업 살짝 아래 가운데'에 따로 배치(요청). */
  #pu-overlay .pu-banner-close {
    position:absolute; top:calc(100% + 12px); left:50%; right:auto; transform:translateX(-50%); width:46px; height:46px;
    background:var(--close-bg) center/contain no-repeat;
    color:transparent;
    cursor:pointer;
    user-select:none;
    border-radius:50%;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.4));
  }
  #pu-overlay .pu-banner-close:active { transform:translate(-50%,2px); filter:drop-shadow(0 1px 2px rgba(0,0,0,.4)); }
  /* 매직봉/셔플 모드(액션 버튼=SHUFFLE 노출)에서는 X 를 배너 아래가 아니라 '셔플 버튼 아래'로 내린다(요청).
     X 의 offset parent 는 .pu-banner(top:82px+safe). 셔플 버튼은 top:178px+safe, 높이 ~52px → 하단 ~230px+safe.
     X 를 그 아래(~242px+safe)에 두려면 배너기준 top=160px(=242-82, safe 는 양쪽 상쇄). */
  body.puactive-wand #pu-overlay .pu-banner-close,
  body.puactive-shuffle #pu-overlay .pu-banner-close { top:160px; }
  /* 액션 버튼(마법봉 SHUFFLE 등): 공용 픽셀 버튼(.pix-btn) 룩. 배너 아래 별도 위치, 큐브 영역 위. */
  #pu-overlay .pu-action-btn {
    display:none;
    position:absolute; top:calc(178px + var(--safe-top)); left:50%; transform:translateX(-50%);
    padding:11px 30px;
    background:linear-gradient(180deg,#5fdc4f 0%,#39b13a 100%);
    border:4px solid #2a7a2c; border-radius:14px;
    font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif;
    font-weight:400; font-size:22px; color:#fff; cursor:pointer;
    box-shadow:0 6px 0 #21601f, 0 9px 14px rgba(0,0,0,.32), inset 0 3px 0 rgba(255,255,255,.45);
    text-shadow:0 2px 0 rgba(0,72,22,.55);
    pointer-events:auto;
    white-space:nowrap;
  }
  #pu-overlay .pu-action-btn.show { display:block; }
  #pu-overlay .pu-action-btn:active { transform:translateX(-50%) translateY(4px); box-shadow:0 2px 0 #21601f, 0 4px 8px rgba(0,0,0,.3), inset 0 3px 0 rgba(255,255,255,.4); }
  /* 대포 마스코트(rainbow 모드): 화면 하단(슬롯 row 자리)에 표시 */
  #pu-cannon-mascot {
    display:none;
    position:absolute; left:50%; bottom:90px;   /* 사용자 요청: 청소기/대포 사용 에셋을 아래로 내림(170→90px) */
    transform:translateX(-50%);
    width:180px; height:200px;
    background-repeat:no-repeat; background-position:center; background-size:contain;
    pointer-events:none;     /* 마스코트 자체는 클릭 불필요. 캔버스(큐브) 탭이 통과 */
    filter:drop-shadow(0 8px 8px rgba(0,0,0,.35));
    z-index:1;               /* 배너(부모 컨텍스트 위에서 더 낮게) */
  }
  #pu-cannon-mascot.show { display:block; }

  /* 청소기(vacuum) 사용 이미지: 대포 마스코트(#pu-cannon-mascot)와 동일 좌표/크기로 제자리 등장.
     노즐 입구=이미지 상단. 복셀 모델 + 이 이미지만 dim 위(z-index)로 떠 보인다(사용자 요청).
     캔버스 탭은 통과(pointer-events:none). 슬라이드인 제거 — 대포처럼 .show 시 그 자리에 바로 표시. */
  #pu-vacuum-img {
    display:none;
    position:absolute; left:50%; bottom:90px;   /* = #pu-cannon-mascot 와 동일(170→90px 아래로 내림) */
    transform:translateX(-50%);
    width:180px; height:200px;                    /* = #pu-cannon-mascot 와 동일 */
    background-repeat:no-repeat; background-position:center; background-size:contain;
    pointer-events:none;
    filter:drop-shadow(0 8px 8px rgba(0,0,0,.35));
    z-index:19;   /* dim(17) + 보조캔버스(18) 위 — 모델과 청소기만 떠 보이게 */
    will-change:transform;
  }
  #pu-vacuum-img.show { display:block; }
  #pu-vacuum-img.in { transform:translateX(-50%); }   /* 슬라이드 제거 후에도 .in 토글 호환(좌표 동일) */
  /* CSS 폴백 모양(에셋 부재 시): 주황 원통 + 어두운 노즐(상단) */
  #pu-vacuum-img.fallback {
    background:none; width:170px; height:200px;
  }
  #pu-vacuum-img.fallback::before {  /* 노즐(상단) */
    content:''; position:absolute; left:50%; top:0; transform:translateX(-50%);
    width:64px; height:54px; border-radius:50% 50% 38% 38%;
    background:radial-gradient(ellipse at 50% 40%, #2a2520 0%, #2a2520 52%, #f08a2a 54%, #c46a18 100%);
    box-shadow:inset 0 -6px 8px rgba(0,0,0,.4);
  }
  #pu-vacuum-img.fallback::after {   /* 본체(하단) */
    content:''; position:absolute; left:50%; bottom:0; transform:translateX(-50%);
    width:150px; height:118px; border-radius:42% 42% 30% 30%;
    background:linear-gradient(165deg,#ffae54 0%,#f0892a 55%,#c46a18 100%);
    box-shadow:inset 0 6px 8px rgba(255,255,255,.4), inset 0 -10px 12px rgba(0,0,0,.3), 0 6px 10px rgba(0,0,0,.35);
  }

  /* 파워업 버튼 비활성(prereq 미충족) */
  .pu.disabled { filter:grayscale(.75) brightness(.65); cursor:not-allowed; pointer-events:none; }  /* 아이템 아이콘은 투명도 금지(사용자 요청) — grayscale/brightness로만 비활성 표현, 불투명 유지 */

  /* ---- Queue ---- */
  #queue-row {
    position:absolute; left:0; right:0; bottom:120px; height:130px;
    display:flex; gap:9px; justify-content:center; align-items:flex-end; z-index:8;
    padding:0 10px; pointer-events:none;   /* 큐는 3D 옥토퍼스 → 탭은 캔버스 레이캐스트로 */
  }
  .qcol { display:flex; flex-direction:column; gap:5px; align-items:center; }

  /* ---- Cannon character (DOM) ---- */
  .cannon {
    width:54px; border-radius:30%; position:relative;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:900; font-size:21px;
    text-shadow:0 2px 0 rgba(0,0,0,.22), 0 2px 4px rgba(0,0,0,.4);
    background: linear-gradient(165deg, var(--cl,#dfe6ef) 0%, var(--cc,#c2cede) 52%, var(--cd,#9fb0c4) 100%);
    box-shadow:
      inset 0 5px 6px rgba(255,255,255,.55),
      inset 0 -8px 9px rgba(0,0,0,.26),
      0 5px 0 var(--cs,#8090a4),
      0 9px 10px rgba(0,0,0,.34);
  }
  .cannon > span { position:relative; z-index:2; }
  .cannon::after {            /* 상단 글로시 하이라이트 */
    content:''; position:absolute; left:15%; right:15%; top:8%; height:30%;
    border-radius:50%;
    background:radial-gradient(ellipse at center, rgba(255,255,255,.65), rgba(255,255,255,0) 72%);
    pointer-events:none; z-index:1;
  }
  .cannon.slotc { height:54px; }
  .cannon.qcard { height:46px; font-size:19px; border-radius:28%; }
  .cannon.front { z-index:2; }  /* 앞 대포 시각 강조 없음 — 클릭 가능만 로직으로 제한 */
  .cannon.spent { filter:grayscale(.85) brightness(.62); }
  /* 큐 카드 균일 표시 */
  .qfade { opacity:.45; }

  /* ---- Power-ups ---- */
  /* 하단 4개 아이템이 올라가는 흰색 트레이 배경(독립 조절용 — 에디터에서 크기/이미지 변경 가능) */
  #pu-tray {
    position:absolute; left:0; right:0; bottom:0; height:104px; z-index:8; pointer-events:none;
    background:none;   /* 사용자 요청: 하단 아이템 버튼 뒤 그라데이션 검은 박스 제거 */
    background-size:100% 100%; background-repeat:no-repeat; transform-origin:bottom center;
  }
  #powerups {
    position:absolute; left:0; right:0; bottom:0; height:116px;
    display:flex; gap:6px; justify-content:center; align-items:center; z-index:9;
  }
  /* ★ 단독/릴스(IS_SOLO) 가격 라벨 노출 보장(2026-06-26 사용자 신고: 가격 안 보임): 아이템 행을
     화면 맨 아래 가장자리(+세이프에어리어)에서 띄워, 버튼 아래로 -7px 매달린 .pu-price 골드 라벨이
     뷰포트/세이프인셋에 잘리지 않게 한다. 본게임(로비 iframe)/에디터 레이아웃은 그대로(solo 한정 스코프). */
  body.solo #powerups, body.gamereels #powerups, body.reels #powerups {
    padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 18px);
    box-sizing:border-box;
  }
  /* 파워업 슬롯 — 브롤 글로시 라운드 프레임(호스트 pu_base 없을 때 폴백) */
  .pu { width:72px; height:72px; position:relative; pointer-events:auto; border-radius:19px;
    background:linear-gradient(180deg,#56a4ff 0%,#2f86e6 50%,#1f6fd0 100%);
    border:3px solid #13315c;
    box-shadow:0 5px 0 #0e294f, 0 7px 11px rgba(8,28,64,.3),
               inset 0 3px 0 rgba(255,255,255,.5), inset 0 -5px 8px rgba(11,52,110,.4); }
  .pu::after { content:''; position:absolute; left:5px; right:5px; top:3px; height:44%;
    border-radius:12px; background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,255,255,0)); pointer-events:none; z-index:1; }
  /* 호스트가 pu_base 이미지를 제공하면 폴백 프레임/글로시 숨김(이중 프레임 방지) */
  .pu:has(.pu-base){ background:none; border:none; box-shadow:none; }
  .pu:has(.pu-base)::after{ display:none; }
  /* 입체(3D 글로시) 아이콘/프레임 — 부드럽게 다운스케일(pixelated 금지: 업스케일 전용이라 3D 아이콘이 거칠어짐). */
  .pu-base { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; z-index:2;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.28)); }
  .pu-icon { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:3;
    width:72%; height:72%; object-fit:contain; pointer-events:none;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.35)); }
  .pu-badge { position:absolute; right:-6px; bottom:-7px; width:46%; height:46%; z-index:4;
    display:flex; align-items:center; justify-content:center; }
  .pu-badge img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,.3)); }
  /* 사용가능 배지(개수) — 모서리 둥근 정사각형 빨강 토이 배지(요청). 이미지 대신 CSS 라운드 스퀘어. */
  .pu-badge span { position:relative; z-index:2; width:23px; height:23px; padding:0; box-sizing:border-box;
    display:flex; align-items:center; justify-content:center; line-height:1;
    font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-weight:400; font-size:13px; color:#fff;
    background:radial-gradient(circle at 38% 30%, #ff7d63 0%, #ef4a31 55%, #d23418 100%);
    border:2px solid #fff; border-radius:7px;
    box-shadow:0 2px 3px rgba(120,20,0,.4), inset 0 1px 0 rgba(255,255,255,.4);
    text-shadow:0 1px 1px rgba(120,20,0,.5); }
  /* 잠금 LV 배지 — 작은 초록 원 배지(남색 펠릿 제거) */
  .pu-lv { position:absolute; bottom:-7px; left:50%; transform:translateX(-50%); z-index:4;
    font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-weight:400; font-size:11px; color:#fff;
    background:#3cc451; border:2px solid #fff;
    padding:2px 7px; border-radius:11px; white-space:nowrap;
    box-shadow:0 1px 3px rgba(0,0,0,.3);
    text-shadow:0 1px 1px rgba(0,60,20,.4); }
  .pu.locked .pu-base, .pu.locked .pu-icon { filter:grayscale(.75) brightness(.66); }
  /* 릴스/단독 구매형: 미보유·해금 아이템의 코인 가격 라벨 — .pu-lv 와 같은 위치/크기, 코인 골드 톤 */
  .pu-price { position:absolute; bottom:-7px; left:50%; transform:translateX(-50%); z-index:4;
    display:flex; align-items:center; gap:2px;
    font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-weight:400; font-size:11px; color:#5a3a00;
    background:linear-gradient(180deg,#ffe08a 0%,#f5b417 70%,#e09a00 100%); border:2px solid #fff;
    padding:2px 7px; border-radius:11px; white-space:nowrap;
    box-shadow:0 1px 3px rgba(0,0,0,.3);
    text-shadow:0 1px 0 rgba(255,255,255,.5); }
  .pu-price .pu-price-coin { display:none; }
  /* 코인 아이콘 에셋이 있으면 가격 앞에 작은 코인 표시(없으면 골드 라벨만) */
  .pu-price.has-icon .pu-price-coin { display:inline-block; width:12px; height:12px; flex:0 0 auto;
    background:var(--coin-pixel, var(--coin-icon, radial-gradient(circle at 35% 30%, #ffe08a, #f5b417 70%, #d68f00))) center/contain no-repeat; }
  /* 코인 부족: 아이템 전체 회색(가격은 계속 보임, 발동 불가). 가격 라벨 자체는 흐리되 읽히게 유지. */
  .pu.cantafford .pu-base, .pu.cantafford .pu-icon { filter:grayscale(.85) brightness(.6); }
  .pu.cantafford { cursor:not-allowed; }
  .pu.cantafford .pu-price { filter:saturate(.55) brightness(.92); opacity:.92; }

  /* ---- Overlays ---- */
  #result-overlay {
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(10,18,32,0.45); z-index:30; pointer-events:none;
  }
  #result-overlay .msg {
    font-size:38px; font-weight:900; color:#fff; text-shadow:0 4px 14px rgba(0,0,0,.5);
    transform:scale(.6); opacity:0; transition:transform .25s cubic-bezier(.2,1.4,.5,1), opacity .25s;
    white-space:nowrap;
  }
  #result-overlay.show .msg { transform:scale(1); opacity:1; }
  /* Clear (스테이지 클리어) 오버레이: 컨페티 + 회전 텍스트 + Tap to Next Stage + 코인 보상 */
  #clear-overlay {
    position:fixed; inset:0; display:none; z-index:190; overflow:hidden;   /* #fit-root 직속 → 딤이 전체 뷰포트 커버, 콘텐츠는 화면 중앙 */
    pointer-events:auto;     /* 탭으로 다음 스테이지 */
    background:rgba(10,18,32,0.40);
    font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif;   /* 결과창 픽셀 폰트 */
  }
  #clear-overlay.show { display:block; }
  #clear-confetti {
    position:absolute; inset:0; overflow:hidden; pointer-events:none;
  }
  .confetti-piece {
    position:absolute; top:0; left:0; width:10px; height:18px;
    transform-origin:center; will-change:transform, opacity;
    pointer-events:none;
  }
  #clear-title {
    position:absolute; top:38%; left:50%; transform:translate(-50%, -50%) rotate(-6deg);
    font-size:64px; font-weight:900;
    color:#fff;
    -webkit-text-fill-color:#fff;
    /* multi-shadow로 outline 효과(stroke 대신) — fill이 hollow 되지 않게 보장 */
    text-shadow:
      -3px -3px 0 #1a2e5a,
       3px -3px 0 #1a2e5a,
      -3px  3px 0 #1a2e5a,
       3px  3px 0 #1a2e5a,
       0  6px 0 #1a2e5a,
       0  9px 16px rgba(0,0,0,.55);
    white-space:nowrap; letter-spacing:.5px;
    pointer-events:none;
  }
  /* 글자별 순차 등장: scale 0 → 오버슈트(뾰잉) → 정착. animation-delay로 물흐르듯 stagger */
  #clear-title .ch {
    display:inline-block; transform:scale(0); opacity:0;
    animation:char-pop .42s cubic-bezier(.2,1.7,.4,1) forwards;
  }
  @keyframes char-pop {
    0%   { transform:scale(0)   translateY(8px);  opacity:0; }
    55%  { transform:scale(1.3) translateY(-5px); opacity:1; }
    100% { transform:scale(1)   translateY(0);    opacity:1; }
  }
  #clear-footer {
    position:absolute; bottom:140px; left:0; right:0;
    display:flex; flex-direction:column; align-items:center; gap:14px;
    pointer-events:none;
  }
  #clear-tap {
    font-size:24px; font-weight:900; color:#fff;
    text-shadow:0 3px 0 #1a2e5a, 0 5px 10px rgba(0,0,0,.55);
    animation: cf-pulse 1.2s ease-in-out infinite;
    letter-spacing:.3px;
  }
  @keyframes cf-pulse { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.08); } }
  #clear-coin {
    display:flex; align-items:center; gap:8px;
    padding:8px 18px;
    background:rgba(8,18,40,.55); border-radius:16px;
    border:3px solid rgba(255,224,138,.6); box-shadow:0 4px 0 rgba(0,0,0,.35);
  }
  #clear-coin .coin-bigicon {
    width:28px; height:28px; border-radius:50%;
    background:var(--coin-icon, radial-gradient(circle at 35% 30%, #ffe08a, #f5b417 70%, #d68f00)) center/contain no-repeat;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.4));
  }
  #clear-coin .coin-val { font-size:22px; font-weight:900; color:#ffe08a; text-shadow:0 2px 3px rgba(0,0,0,.5); }
  /* 블록 보상(로비 디오라마 재화) — 클리어 화면 주 보상 */
  #clear-blocks {
    display:flex; align-items:center; gap:9px; padding:10px 22px; margin-bottom:10px;
    background:rgba(8,18,40,.55); border-radius:16px; border:3px solid rgba(124,196,255,.7); box-shadow:0 4px 0 rgba(0,0,0,.35);
  }
  /* ★ 보상 큐브 아이콘: 평평한 파란 사각형(플레이스홀더처럼 보임) → 입체 토이블록 느낌으로(2026-06-26 시각QA BUG1) */
  #clear-blocks .block-bigicon {
    width:30px; height:30px; border-radius:7px;
    background:linear-gradient(155deg,#cdebff 0%,#7bbcf7 48%,#3a82de 100%);
    box-shadow:inset 0 4px 2px rgba(255,255,255,.6), inset -3px -5px 4px rgba(16,52,110,.55), inset 0 0 0 1.5px rgba(255,255,255,.28), 0 3px 4px rgba(0,0,0,.4);
  }
  #clear-blocks .block-val { font-size:27px; font-weight:900; color:#cfe6ff; text-shadow:0 2px 3px rgba(0,0,0,.5); }

  /* ── Wave2-A: 디오라마 마일스톤 보상 토스트(.pix-card 블루 톤 + 골드 강조) ── */
  .milestone-toast{
    display:flex; align-items:center; gap:10px; padding:9px 16px 9px 13px; border-radius:14px;
    background:linear-gradient(180deg,#234a83 0%,#1a3a6c 100%); border:3px solid #ffcf45;
    box-shadow:0 5px 0 #0a1830,0 8px 16px rgba(120,80,8,.45),inset 0 2px 0 rgba(120,165,235,.3);
    transform:translateY(-22px) scale(.86); opacity:0; transition:transform .34s cubic-bezier(.2,1.3,.4,1),opacity .34s;
  }
  .milestone-toast.in{ transform:translateY(0) scale(1); opacity:1; }
  .milestone-toast.out{ transform:translateY(-14px) scale(.92); opacity:0; }
  .milestone-toast.done{ border-color:#ffe06a; box-shadow:0 5px 0 #0a1830,0 0 18px rgba(255,210,90,.7),inset 0 2px 0 rgba(255,255,255,.3); }
  .milestone-toast .ms-pct{ font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-size:13px; color:#ffe6b0; letter-spacing:.3px; text-shadow:0 1px 0 #0b1d3e; }
  .milestone-toast .ms-ic{ width:26px; height:26px; filter:drop-shadow(0 1px 2px rgba(0,0,0,.4)); }
  .milestone-toast .ms-gift{ width:26px; height:26px; border-radius:7px;

  .milestone-toast .ms-gift::before{ content:''; position:absolute; left:50%; top:0; transform:translateX(-50%); width:5px; height:100%; background:#e0432f; }
  .milestone-toast .ms-gift::after{ content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:100%; height:5px; background:#e0432f; }
  .milestone-toast .ms-rw{ font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-size:16px; color:#fff; letter-spacing:.3px; text-shadow:0 2px 0 #0b1d3e; text-transform:capitalize; }

  /* ── HARD LEVEL! 배너(2026-06-26 #6): 위험 신호(레드/오렌지) 액센트의 네이비 픽셀 카드. 진입 시 1.5s 팝 후 페이드. ── */
  #hard-banner{ position:absolute; left:50%; top:34%; transform:translate(-50%,-50%) scale(.5) rotate(-4deg);
    z-index:120; pointer-events:none; opacity:0;
    display:flex; align-items:center; gap:11px; padding:13px 24px; border-radius:16px; white-space:nowrap;
    background:linear-gradient(180deg,#7a1f1f 0%,#4a1230 100%); border:4px solid #ffb347;
    box-shadow:0 7px 0 #2a0a14, 0 12px 22px rgba(120,8,8,.5), inset 0 3px 0 rgba(255,180,90,.4), inset 0 -4px 0 rgba(40,4,8,.5);
    font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; }
  #hard-banner.show{ animation:hardBannerPop 1.9s cubic-bezier(.2,1.5,.4,1) forwards; }
  #hard-banner .hb-skull{ font-size:30px; filter:drop-shadow(0 2px 2px rgba(0,0,0,.4)); }
  #hard-banner .hb-txt{ font-size:27px; color:#fff; letter-spacing:.6px;

  @keyframes hardBannerPop{

    26%  { transform:translate(-50%,-50%) scale(.96) rotate(-1deg); }
    36%  { transform:translate(-50%,-50%) scale(1.03) rotate(0deg); }
    78%  { opacity:1; transform:translate(-50%,-50%) scale(1) rotate(0deg); }
    100% { opacity:0; transform:translate(-50%,-58%) scale(.94) rotate(0deg); }
  }

  /* ── ITEM UNLOCK 팝업(2026-06-26 #7): 아이템 해금 첫 진입 시 설명 + 무료 1개 안내(.pix-card 네이비 톤). ── */

  .iu-card{ width:278px; max-width:84%; padding:24px 22px 22px; opacity:0; transform:scale(.7);

  .iu-new{ display:inline-block; margin-bottom:9px; padding:3px 13px; border-radius:11px;

    background:linear-gradient(180deg,#ffe06a 0%,#ffb931 100%); border:2px solid #fff;

  .iu-name{ font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-size:24px; color:#fff; letter-spacing:.5px;

  /* ── ITEM BUY 팝업(단독/릴스 전용): item-unlock 과 동일 .iu-card 네이비 아트톤 + 가격행 + Buy/Cancel. ── */

  .ib-actions .pix-btn{ flex:1 1 0; padding:16px 12px; font-size:23px; letter-spacing:.5px;   /* Cancel 제거 → Buy 단독 풀폭·크게(2026-06-27 사용자: 취소는 우상단 X로) */
    display:flex; align-items:center; justify-content:center; gap:8px; }
  /* (ib-buy-val ::before 제거 — 버튼 라벨은 JS 에서 'Buy' 로 직접 설정, 2026-06-27) */
  /* Cancel = 중립 회청 버튼(.pix-btn 입체 유지, 초록 대신 슬레이트) */
  .ib-cancel{ background:linear-gradient(180deg,#6f86ab 0%,#4f688c 100%); border-color:#374f70;

  .ib-buy.disabled{ background:linear-gradient(180deg,#8b95a3 0%,#697482 100%); border-color:#535d6b;

  #combo-text {
    display:none;   /* 콤보 텍스트 출력 제거(사용자 요청) */
  }
  /* crisis-vignette: 피버 시 외곽 빛 효과 — 사용자 요청으로 비활성화. opacity 항상 0 + display:none. */
  #crisis-vignette {
    display:none;
  }
  #pu-hint {
    position:absolute; left:0; right:0; bottom:116px; text-align:center; z-index:16;
    color:#ffe08a; font-weight:900; font-size:17px; letter-spacing:.5px;

  }

  /* ===== 디오라마 제작 화면 (클리어 직후) ===== */
  /* ★ 제작화면(making page) 제거 — 디오라마 빌드는 로비 컬렉션 빌드뷰로 이전(2026-06-14).
     인게임에서 더는 진입하지 않으며, .show 가 붙어도 절대 보이지 않게 강제 숨김(이중 안전). */
  #make-overlay {
    position:absolute; inset:0; z-index:55; display:none !important;
    background: var(--asset-background, linear-gradient(180deg,#11457f 0%,#1c5da3 48%,#2a72bf 100%));
    flex-direction:column; align-items:center;
  }
  #make-overlay.show { display:none !important; }
  #make-top { position:absolute; top:calc(112px + env(safe-area-inset-top)); left:16px; right:16px; z-index:4; display:flex; align-items:center; }   /* 코인 마일스톤 카드가 상단에 안 잘리게 내림 */
  /* 망치 배지(제작중) + 아래 % */
  #make-hammer { position:relative; flex:0 0 auto; width:58px; height:58px; z-index:3; margin-right:-13px; }
  /* 픽셀 배지 프레임(--make-badge) — 동그라미 자체가 픽셀아트. 폴백은 기존 글로시 블루 원. */
  #make-hammer .circ { position:relative; overflow:visible; width:58px; height:58px; border-radius:50%; background:var(--make-badge, radial-gradient(circle at 38% 30%, #6aa9f0 0%, #3f7fd6 46%, #1f86e6 100%)) center/contain no-repeat; image-rendering:pixelated; filter:drop-shadow(0 4px 4px rgba(8,28,64,.34)); display:flex; align-items:center; justify-content:center; }
  #make-hammer .circ::before { content:none; }
  /* 망치 아이콘 = 토이-3D(ui_m_build) — 픽셀 렌더링 제거(부드럽게 축소). image-rendering 은 상속 속성이라
     부모 .circ(픽셀 배지)에서 pixelated 가 내려오므로 auto 로 명시 오버라이드(토이-3D 가 거칠지 않게). 배지보다 살짝 키워 또렷이. */
  #make-hammer .hicon { position:relative; z-index:1; width:38px; height:38px; background:var(--make-hammer) center/contain no-repeat; image-rendering:auto; filter:drop-shadow(0 1px 1.5px rgba(0,0,0,.35)); }
  #make-hammer-pct { position:absolute; left:50%; top:48px; transform:translateX(-50%); white-space:nowrap; background:linear-gradient(180deg,#1b3357,#0c1d3b); color:#fff; font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-weight:400; font-size:13px; padding:3px 12px; border-radius:11px; border:2px solid #13315c; box-shadow:inset 0 1px 0 rgba(120,170,235,.45), 0 2px 4px rgba(0,0,0,.4); text-shadow:0 1px 1px rgba(0,0,0,.5); }
  /* 네이비 바 + 그리드 + 골드 게이지 */
  #make-barwrap { position:relative; flex:1 1 auto; height:32px; border-radius:18px; background:linear-gradient(180deg,#1a3a6b,#0e2042); box-shadow:inset 0 4px 6px rgba(0,0,0,.55), 0 3px 0 rgba(8,28,64,.4); border:3px solid #13315c; overflow:visible; }
  #make-fillclip { position:absolute; inset:4px; border-radius:13px; overflow:hidden; }
  #make-bar { position:absolute; left:0; top:0; bottom:0; width:0%; border-radius:13px; background:linear-gradient(180deg,#fff6cf 0%,#ffd45e 55%,#ffbf36 100%); box-shadow:0 0 10px rgba(255,210,110,.7), inset 0 3px 0 rgba(255,255,255,.75), inset 0 -3px 5px rgba(190,110,0,.3); transition:width .15s linear; }
  #make-grid { position:absolute; left:20px; right:9px; top:6px; bottom:6px; pointer-events:none;
    background-image:repeating-linear-gradient(90deg, transparent 0, transparent calc(100%/8 - 2px), rgba(150,180,235,.5) calc(100%/8 - 2px), rgba(150,180,235,.5) calc(100%/8));
    -webkit-mask:repeating-linear-gradient(0deg,#000 0 4px, transparent 4px 9px); mask:repeating-linear-gradient(0deg,#000 0 4px, transparent 4px 9px); }
  #make-ms-layer { position:absolute; inset:0; pointer-events:none; }
  /* 보상 태그(말풍선): 바 위 30/70/100% 지점 */
  .make-ms { position:absolute; bottom:calc(100% + 12px); transform:translateX(-50%); z-index:3; width:54px; }
  /* 픽셀 카드: 플랫 채움 + 각진 픽셀 테두리 + 픽셀 그림자(광택 제거) */
  .make-ms .card { position:relative; background:#e6eefb; border:3px solid #13315c; border-radius:5px; padding:6px 4px 5px; display:flex; flex-direction:column; align-items:center; box-shadow:0 4px 0 #0e294f; image-rendering:pixelated; }
  .make-ms .card::before { content:none; }
  .make-ms .card::after { content:''; position:absolute; left:50%; top:100%; transform:translateX(-50%); width:0; height:0; border:8px solid transparent; border-top-color:#13315c; }
  .make-ms .ic { position:relative; z-index:1; width:34px; height:34px; background:var(--coin-pixel, var(--coin-icon)) center/contain no-repeat; }
  .make-ms .amt { position:relative; z-index:1; font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-weight:400; font-size:15px; color:#13315c; background:none; border:none; padding:0 2px; margin-top:2px; line-height:1.3; }
  .make-ms.hit .card { border-color:#ffd24a; box-shadow:0 0 12px rgba(255,200,70,.9), 0 4px 0 #b8870f, inset 0 2px 0 rgba(255,255,255,.95); }
  /* 제작 3D 캔버스 = 풀스크린(밴드 윗경계 seam 제거 · 배경이 화면 전체를 채움). 상단 진행바/하단 버튼은 더 높은 z 로 오버레이.
     프레이밍(머리·발 안 잘림)은 mkResize 가 'UI 클리어존'(진행바 아래 ~ 버튼 위)에 모델을 맞춰 책임진다. */
  #make-stage { position:absolute; inset:0; z-index:1; }
  #make-canvas { width:100%; height:100%; display:block; }
  #make-spot { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:72vw; height:72vw; max-width:420px; max-height:420px; border-radius:50%; background:radial-gradient(circle, rgba(225,242,255,.46) 0%, rgba(210,235,255,.20) 50%, rgba(210,235,255,0) 70%); z-index:2; pointer-events:none; }
  #make-label { position:absolute; left:0; right:0; bottom:170px; text-align:center; z-index:2; font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-weight:400; font-size:23px; letter-spacing:.5px; color:#ffffff; text-shadow:0 2px 0 #13315c, 0 4px 0 #0e294f, 0 5px 7px rgba(8,28,64,.55); }
  #make-pct { display:none; }   /* % 표시는 망치 배지로 이동 */
  /* 빌드(채우기) 버튼 — 초록 글로시 버튼 이미지(btn_green) + 큐브/카운트 오버레이. 내부 테두리 없음. */
  #make-btn {
    position:absolute; left:50%; transform:translateX(-50%); bottom:46px; z-index:5;
    width:232px; height:88px; border:none; border-radius:22px; padding:0 0 11px;
    background:#91F55B; box-shadow:0 6px 0 rgba(0,0,0,.45);
    color:#111315; font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-weight:400; font-size:27px; letter-spacing:.5px;
    text-shadow:none;
    display:flex; align-items:center; justify-content:center; gap:11px; cursor:pointer;
    user-select:none; -webkit-user-select:none; touch-action:none;
  }
  #make-btn:active { transform:translateX(-50%) translateY(4px) scale(.985); filter:brightness(.95); }
  #make-btn.holding { filter:brightness(1.06) saturate(1.08); }
  #make-btn .cubeicon, #make-btn #make-cubes { position:relative; z-index:1; }
  /* 숫자(완성 큐브 수) 슬롯을 고정폭+가운데정렬 → 자릿수(10 vs 26 vs 100)가 달라도 좌측 큐브 아이콘 위치가 안 밀린다 */
  #make-btn #make-cubes { width:64px; text-align:center; box-sizing:border-box; }
  #make-btn .cubeicon { width:34px; height:34px; background:var(--make-cube, linear-gradient(160deg,#eaf7ff,#5fb8f5)) center/contain no-repeat; filter:drop-shadow(0 2px 2px rgba(0,0,0,.32)); }
  #make-btn.done { filter:brightness(1.08); }
  #make-btn .mk-continue-txt { position:relative; z-index:1; font-size:26px; letter-spacing:1px; }
  /* Continue 모드: 통일 CTA 스펙(플랫 #91F55B 알약, 글자 #111315) */
  #make-btn.mk-continue { width:min(72%,320px); height:auto; padding:16px 0; border-radius:28px; background:#91F55B; box-shadow:none; color:#111315; text-shadow:none; }
  #make-btn.mk-continue .mk-continue-txt { font-size:20px; font-weight:800; letter-spacing:.5px; line-height:1.2; }
  #make-btn.mk-continue:active { transform:translateX(-50%) scale(.97); filter:none; opacity:.85; }
  #make-home { position:absolute; right:16px; bottom:64px; z-index:3; width:54px; height:54px; border-radius:50%; border:none; background:rgba(255,255,255,.9); box-shadow:0 4px 0 rgba(0,0,0,.18); font-size:24px; cursor:pointer; display:none; }
  #make-coinpop { position:absolute; left:50%; top:40%; transform:translateX(-50%); z-index:4; font-size:30px; font-weight:900; color:#ffcf3f; text-shadow:0 2px 4px rgba(0,0,0,.4); opacity:0; pointer-events:none; }
  /* 넥스트 버튼 — 통일 CTA 스펙: 플랫 #91F55B 알약(글로시/3D 레지 없음), 글자 #111315, 하단 중앙 */
  #make-next { position:absolute; left:50%; transform:translateX(-50%); bottom:52px; z-index:5; overflow:hidden; width:min(72%,320px); padding:16px 0; border:none; border-radius:28px; background:#91F55B; box-shadow:none; color:#111315; font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-weight:800; font-size:20px; line-height:1.2; letter-spacing:.5px; text-align:center; text-shadow:none; cursor:pointer; display:none; }
  #make-next::before { content:none; }
  #make-next:active { transform:translateX(-50%) scale(.97); opacity:.85; }
  /* 디오라마 완성 연출 배너 */
  #make-complete { position:absolute; left:0; right:0; top:38%; z-index:6; text-align:center; font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-size:30px; font-weight:900; color:#fff; text-shadow:0 3px 0 #f5a623, 0 5px 10px rgba(0,0,0,.35); opacity:0; transform:scale(.5); pointer-events:none; }
  #make-complete.show { animation:mkpop 1.6s ease-out forwards; }
  @keyframes mkpop { 0%{opacity:0;transform:scale(.4) rotate(-6deg);} 15%{opacity:1;transform:scale(1.12) rotate(2deg);} 28%{transform:scale(1) rotate(0);} 80%{opacity:1;transform:scale(1);} 100%{opacity:0;transform:scale(1.05) translateY(-20px);} }
  /* 비네팅: 가장자리 살짝 어둡게 → 깊이감 + 가운데 집중 (브롤톤 블루) */
  #make-vignette { position:absolute; inset:0; z-index:2; pointer-events:none; background:radial-gradient(ellipse 78% 62% at 50% 43%, rgba(10,52,110,0) 42%, rgba(10,52,110,.12) 66%, rgba(10,40,90,.36) 100%); }
  /* 디오라마(3D)·UI는 스포트라이트 위에 — 묻힘 방지 */
  #make-overlay #make-top, #make-overlay #make-label, #make-overlay #make-pct { z-index:4; }
  #make-overlay #make-btn, #make-overlay #make-next, #make-overlay #make-home { z-index:5; }
  #make-overlay #make-coinpop { z-index:6; }
  #make-overlay #make-complete { z-index:7; }
  /* ===== 게임오버 'Continue?' 팝업 — 다른 팝업과 통일한 픽셀 프레임(딥블루 카드 + 픽셀 폰트) ===== */
  /* #fit-root 직속(게임박스 밖)으로 이동 → 딤이 전체 뷰포트(레터박스 포함)를 덮음. position:fixed; inset:0 = #fit-root 기준(transform 컨테이닝 블록).
     z:198 = #hud-top(z120)·게임박스·#pu-overlay(z195) 위로 올려 게임오버 딤이 HUD·아이템바까지 덮게(이동 전 박스내부 z72 였으나 #fit-root 직속이 되며 HUD z120 보다 낮으면 HUD 가 안 덮임). */
  #over-overlay { position:fixed; inset:0; z-index:198; display:none; align-items:center; justify-content:center; background:rgba(6,16,34,.62); }
  #over-overlay.show { display:flex; }
  /* .pix-card 상속 — width/padding 만 override */
  #over-card { width:300px; max-width:84%; padding:26px 22px 24px; }
  #over-close { z-index:3; }
  #over-title { position:relative; font-size:28px; margin-bottom:15px; }
  /* +N 보상 배너: 노란 픽셀 패널(코인 색 강조) */
  #over-banner { position:relative; margin:0 auto 15px; padding:14px 12px; border-radius:14px;
    background:linear-gradient(180deg,#ffe9a8,#f5c24a); border:4px solid #b27a1a;
    box-shadow:0 4px 0 #8a5c10, inset 0 2px 0 rgba(255,255,255,.6); }
  #over-plus { display:inline-block; font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-size:42px; font-weight:400; color:#6a4a08; text-shadow:0 2px 0 rgba(255,255,255,.6); }
  #over-desc { font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-size:15px; font-weight:400; color:#dfeaff; text-shadow:0 2px 0 #0c1f40; margin-bottom:20px; line-height:1.45; padding:0 4px; letter-spacing:.3px; }
  /* Continue 버튼 — 하나의 둥근 .pix-btn 안에서 '색'으로 두 영역 구분(구분선 없음).
     왼쪽 = 효과(스프링 ×3, 진한 초록) / 오른쪽 = 비용(코인 920, 밝은 초록·골드 글로시).
     경계는 분리선이 아니라 부드러운 색 전환(가로 그라데이션)으로만. 입체감(.pix-btn 테두리·하드그림자) 유지. */
  #over-continue { position:relative; width:min(72%,320px); min-width:0; padding:0; cursor:pointer; overflow:hidden;
    font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-size:20px; font-weight:800;
    display:inline-flex; align-items:stretch; white-space:nowrap;
    color:#111315; border:none; border-radius:28px; box-shadow:none; text-shadow:none;
    /* 통일 CTA 스펙: 플랫 #91F55B (그라데이션·글로시 없음) */
    background:#91F55B; }
  #over-continue::before { content:none; }
  #over-continue:active { transform:scale(.97); opacity:.85; box-shadow:none; }
  #over-continue>* { position:relative; z-index:1; }
  /* 두 영역: 같은 버튼 셰이프 안의 좌/우 절반. 배경은 위 그라데이션이 담당(영역 자체엔 박스/선 없음). */
  #over-continue .over-half { flex:1 1 0; display:inline-flex; align-items:center; justify-content:center; gap:7px;
    padding:16px 10px; white-space:nowrap; }
  #over-continue .over-spring-icon { width:30px; height:30px; background:var(--spring-icon, radial-gradient(circle at 40% 35%, #b6f5a0, #4fb83a)) center/contain no-repeat; filter:drop-shadow(0 2px 2px rgba(0,0,0,.35)); }
  #over-continue #over-spring-x { font-size:22px; text-shadow:0 2px 0 rgba(0,60,18,.6); }
  #over-continue .over-coin { width:26px; height:26px; background:var(--coin-pixel, var(--coin-icon, radial-gradient(circle at 35% 30%,#ffe79a,#f5a623))) center/contain no-repeat; filter:drop-shadow(0 1px 2px rgba(0,0,0,.3)); }
  #over-continue #over-cost { font-size:22px; text-shadow:0 2px 0 rgba(90,60,0,.45); }
  #over-continue.poor { filter:grayscale(1) brightness(.8); opacity:.82; cursor:not-allowed; }   /* ★ 코인 부족: 확실히 회색·비활성(2026-06-26 사용자) */
  /* ★ Retry 버튼 — 통일 CTA 스펙: 플랫 #91F55B 알약, 글자 #111315 */
  #over-retry { display:block; width:min(72%,320px); max-width:100%; margin:11px auto 0; padding:16px 0; cursor:pointer;
    font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-size:20px; font-weight:800; color:#111315;
    letter-spacing:.5px; line-height:1.2; text-shadow:none;
    border:none; border-radius:28px; box-shadow:none;
    background:#91F55B; }
  #over-retry:active { transform:scale(.97); opacity:.85; box-shadow:none; }
  /* ★ 코인 부족 토스트(2026-06-26 사용자): 작게, 아트톤(네이비 카드+코인 아이콘). */
  #coin-toast { position:absolute; left:50%; top:84px; transform:translate(-50%,-14px); z-index:90; pointer-events:none;
    display:flex; align-items:center; gap:8px; padding:9px 15px; border-radius:13px; white-space:nowrap;
    background:rgba(16,28,54,.95); border:2px solid #38507e; box-shadow:0 4px 0 rgba(6,14,32,.6),inset 0 2px 0 rgba(255,255,255,.12);
    font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-size:14px; color:#ffe0b0; letter-spacing:.3px; text-shadow:0 1px 0 #0b1d3e;
    opacity:0; transition:opacity .18s, transform .18s; }
  #coin-toast.show { opacity:1; transform:translate(-50%,0); }
  #coin-toast .ct-coin { width:20px; height:20px; flex:0 0 auto; background:var(--coin-pixel, var(--coin-icon, radial-gradient(circle at 35% 30%,#ffe79a,#f5a623))) center/contain no-repeat; filter:drop-shadow(0 1px 1px rgba(0,0,0,.3)); }
  @keyframes overShake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-9px);} 40%{transform:translateX(8px);} 60%{transform:translateX(-6px);} 80%{transform:translateX(4px);} }
  /* ===== "Oops!" 게임오버 버스트 (화면 중앙 팝 + 큐티 별/반짝이 파티클, 뒤 어둡게) ===== */
  #oops-burst { position:absolute; inset:0; z-index:71; display:none; align-items:center; justify-content:center; pointer-events:none; }
  #oops-burst.show { display:flex; }
  #oops-burst .oops-dim { position:absolute; inset:0; background:rgba(6,16,34,.5); opacity:0; animation:oopsDim .28s ease-out forwards; }
  @keyframes oopsDim { from{opacity:0;} to{opacity:1;} }
  #oops-word { position:relative; z-index:2; font-family:'TitanOne','PixelifySans','BlackHanSans','Jua',sans-serif; font-weight:400;
    font-size:74px; color:#fff; letter-spacing:1px; opacity:0; transform:scale(.2) rotate(-8deg);
    text-shadow:0 0 16px rgba(255,70,70,.95), 0 0 34px rgba(255,40,40,.75), 0 4px 0 #b21515, 0 6px 10px rgba(0,0,0,.45);
    animation:oopsPop .92s cubic-bezier(.2,1.5,.4,1) forwards; }
  @keyframes oopsPop {
    0%   { opacity:0; transform:scale(.2) rotate(-8deg); }
    35%  { opacity:1; transform:scale(1.18) rotate(3deg); }
    52%  { transform:scale(.96) rotate(-1deg); }
    66%  { transform:scale(1.04) rotate(0deg); }
    100% { opacity:1; transform:scale(1) rotate(0deg); }
  }
  .oops-spark { position:absolute; left:50%; top:50%; z-index:1; width:var(--sz,16px); height:var(--sz,16px);
    margin:calc(var(--sz,16px)/-2) 0 0 calc(var(--sz,16px)/-2); pointer-events:none;
    background:var(--spark, radial-gradient(circle at 50% 50%, #fff 0 30%, #ffe27a 38% 60%, rgba(255,200,60,0) 72%));
    opacity:0; transform:translate(0,0) scale(.3); animation:oopsSpark .82s ease-out forwards; }
  .oops-spark.star { background:none; }
  .oops-spark.star::before { content:'★'; position:absolute; inset:0; font-size:var(--sz,16px); line-height:1; color:var(--col,#ffd84a); text-shadow:0 0 6px rgba(255,210,80,.9); }
  @keyframes oopsSpark {
    0%   { opacity:0; transform:translate(0,0) scale(.3); }
    18%  { opacity:1; }
    100% { opacity:0; transform:translate(var(--tx,0), var(--ty,0)) scale(var(--end,1)) rotate(var(--rot,120deg)); }
  }
  /* ── Out of Space 팝업: 실제 문어 일러스트(이미지) + 도식 폴백 ── */
  #over-diagram { position:relative; margin:2px auto 16px; width:230px; height:118px; }
  /* 실제 문어 일러스트(continue_diagram 자산). 자산 로드 시 .has-img 로 표시, 미로드면 schematic 폴백. */
  #over-diagram-img { display:none; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); max-width:100%; max-height:100%; width:auto; height:auto; image-rendering:auto; filter:drop-shadow(0 3px 4px rgba(0,0,0,.35)); }
  #over-diagram.has-img #over-diagram-img { display:block; }
  #over-diagram.has-img #over-diagram-schematic { display:none; }
  #over-diagram-schematic { position:absolute; left:0; top:7px; right:0; bottom:7px; }
  #over-diagram .od-row { position:absolute; left:0; right:0; display:flex; gap:8px; justify-content:center; }
  #over-diagram .od-bottom { bottom:0; }
  #over-diagram .od-top { top:0; }
  #over-diagram .od-cell { width:30px; height:30px; border-radius:9px; border:2px solid rgba(120,160,215,.6); background:rgba(8,20,44,.4); position:relative; box-sizing:border-box; }
  #over-diagram .od-cell.octo { background:linear-gradient(180deg,#ff9bd0,#e85aa6); border-color:#b83b7e; box-shadow:inset 0 2px 0 rgba(255,255,255,.4); }
  #over-diagram .od-cell.octo::after { content:''; position:absolute; left:50%; top:42%; width:10px; height:6px; transform:translate(-50%,-50%);
    background:radial-gradient(circle at 30% 40%, #fff 0 32%, rgba(255,255,255,0) 60%), radial-gradient(circle at 70% 40%, #fff 0 32%, rgba(255,255,255,0) 60%); }
  #over-diagram .od-top .od-cell.octo { width:25px; height:25px; }
  #over-diagram .od-arrow { position:absolute; left:50%; top:34px; transform:translateX(-50%); font-size:20px; color:#7fe06a; text-shadow:0 0 6px rgba(110,220,90,.8); animation:odSpring 1.1s ease-in-out infinite; }
  @keyframes odSpring { 0%,100%{ transform:translateX(-50%) translateY(0);} 50%{ transform:translateX(-50%) translateY(-7px);} }
  /* ===== 온보딩 튜토리얼(1스테이지): 딤 스팟라이트 + 탭 펄스 / 드래그 스와이프 (손 없음·토이톤) ===== */
  #ob-overlay{ position:fixed; inset:0; z-index:120; pointer-events:none; opacity:0; display:none; transition:opacity .35s; }
  #ob-overlay.show{ opacity:1; display:block; }
  /* 딤: 화면을 어둑하게 + 모델/대상문어 '구멍'(스팟라이트)으로 환하게. 텍스트·펄스는 딤 위(z-index:3). */
  /* 딤은 게임 기본 시스템(#dim-layer + #dim-strip + glHi 하이라이트, 아이템 사용과 동일)을 renderSpotlight 에서 재사용 → 별도 #ob-dim 없음. */
  /* 온보딩 중 상단 메타 UI(코인·기어)도 딤 아래처럼 흐리게 — 사용자: 코인재화는 딤 아래로. (LEVEL·튜토 텍스트는 유지) */
  body.ob-active .coin-pill, body.ob-active #settings-btn { opacity:.28; transition:opacity .3s; pointer-events:none; }
  /* 단독 인게임 파일: 인게임 설정(기어) UI 제거(사용자 요청). */
  body.solo #settings-btn { display:none !important; }
  #ob-text{ position:absolute; left:0; right:0; top:13%; text-align:center; padding:0 30px; z-index:3;
    font:800 23px/1.34 -apple-system,'Baloo 2',BlinkMacSystemFont,'Segoe UI',sans-serif; color:#fff; letter-spacing:.2px;
    text-shadow:0 3px 0 #16304f, 0 1px 0 #16304f, 0 0 16px rgba(0,0,0,.6); }
  /* 탭: 말랑 펄 + 확산 링 — updateOctoNumbers 가 앞줄 가운데 문어 머리로 매 프레임 정렬(left/top px). */
  #ob-tap{ position:absolute; left:50%; top:74%; transform:translate(-50%,0); display:none; z-index:3; }
  #ob-overlay.step-tap #ob-tap{ display:block; }
  #ob-swipe{ position:absolute; left:50%; top:45%; transform:translate(-50%,-50%); display:none; z-index:3; }
  #ob-overlay.step-drag #ob-swipe{ display:block; }

<body>
<script src="./js/08_block.js"></script>

<!-- ODG_REGION: markup -->
<div id="fit-root">
  <div id="game-container">
    <canvas id="gl-canvas"></canvas>

    <!-- #hud-top / #settings-btn / #settings-overlay 는 #fit-root 직속(게임박스 밖)으로 이동 → 화면 끝/전체뷰포트 기준 (아래 참조) -->
    <div id="preview-strip" data-edit-id="preview-strip"></div>

    <div id="slots-row" data-edit-id="slots-row"></div>
    <!-- 여분(위 줄) 슬롯 1~3개: 스프링 파워업(1) + 게임오버 Continue(좌측 3슬롯 튕김). JS가 매 프레임 옥토퍼스 위치로 동기화. -->
    <div id="slot-extra" aria-hidden="true"></div>
    <div id="slot-extra1" class="slot-extra-cell" aria-hidden="true"></div>
    <div id="slot-extra2" class="slot-extra-cell" aria-hidden="true"></div>
    <div id="octo-nums"></div>
    <div id="queue-row"></div>

    <div id="pu-tray" data-edit-id="pu-tray"></div>
    <div id="powerups" data-edit-id="powerups"></div>

    <!-- 파워업 활성 시 박스 내부 dim(게임 영역 어둡게 + 스포트라이트 기준). 전체뷰포트 strip dim 은 #fit-root 직속 #dim-strip 이 담당(아래). -->
    <div id="dim-layer" aria-hidden="true"></div>
    <!-- 하이라이트용 보조 캔버스: dim 위에 클릭 가능한 3D 오브젝트만 다시 그림. 메인 캔버스와 동일 박스 좌표 유지(이동 금지). -->
    <canvas id="gl-canvas-hi" aria-hidden="true"></canvas>

    <div id="combo-text"></div>
    <div id="pu-hint"></div>
    <div id="crisis-vignette"></div>
    <div id="result-overlay"><div class="msg" id="result-msg"></div></div>
    <!-- #clear-overlay 는 #fit-root 직속(게임박스 밖)으로 이동 → 딤이 전체뷰포트 커버 (아래 참조) -->
    <div id="loading">Loading…</div>

    <!-- 게임오버 "Oops!" 버스트 (팝업 직전 중앙 연출) -->
    <div id="oops-burst" aria-hidden="true">
      <div class="oops-dim"></div>
      <div id="oops-word">Oops!</div>
    </div>

    <!-- #over-overlay(게임오버 'Out of Space' 팝업) 은 #fit-root 직속(게임박스 밖)으로 이동 → 딤이 전체뷰포트 커버 (아래 참조) -->

    <!-- 코인 부족 토스트(작게, 아트톤) -->
    <div id="coin-toast"><span class="ct-coin"></span><span class="ct-msg">Not enough coins</span></div>

    <!-- HARD LEVEL! 배너(진입 시 1회, 비차단) -->
    <div id="hard-banner"><span class="hb-skull">💀</span><span class="hb-txt">HARD LEVEL!</span></div>

    <!-- #item-unlock-overlay / #item-buy-overlay 는 #fit-root 직속(게임박스 밖)으로 이동 → 딤이 전체뷰포트 커버 (아래 참조). transform 걸린 #game-container 안에선 position:fixed 도 박스 기준이라 딤이 잘림(B.5). -->

    <!-- 디오라마 제작 화면(클리어 직후) -->
    <div id="make-overlay">
      <div id="make-stage"><canvas id="make-canvas"></canvas></div>
      <div id="make-vignette"></div>
      <div id="make-spot"></div>
      <div id="make-top" data-edit-id="make-top">
        <div id="make-hammer" data-edit-id="make-hammer"><div class="circ"><div class="hicon"></div></div><div id="make-hammer-pct">0%</div></div>
        <div id="make-barwrap" data-edit-id="make-bar">
          <div id="make-fillclip"><div id="make-bar"></div></div>
          <div id="make-grid"></div>
          <div id="make-ms-layer"></div>
        </div>
      </div>
      <div id="make-coinpop"></div>
      <div id="make-complete"></div>
      <div id="make-label" data-edit-id="make-label">Hold to Build!</div>
      <div id="make-pct" data-edit-id="make-pct">0%</div>
      <button id="make-btn" data-edit-id="make-btn"><span class="cubeicon"></span><span id="make-cubes">0</span></button>
      <button id="make-next">Continue</button>
      <button id="make-home" data-edit-id="make-home">🏠</button>
    </div>
  </div><!-- /#game-container -->

  <!-- 파워업 dim 의 전체뷰포트 확장: 게임박스 양옆 레터박스 strip 까지 어둡게(딤이 중앙박스에만 갇히던 문제 해결).
       #game-container(transform로 새 stacking context) 보다 뒤(=DOM 앞)에 두고 z 낮게 → 박스 안 게임/스포트라이트는 그대로 위에 보임. 박스 내부 dim 은 #dim-layer 가 담당해 이음새 없이 연결. -->
  <div id="dim-strip" aria-hidden="true"></div>
  <div id="dim-strip-r" aria-hidden="true"></div>

  <!-- 파워업 사용 레이어: #fit-root 직속(전체 뷰포트 기준)으로 이동 → 배너/액션버튼/마스코트가 화면 끝 기준으로 고정. 핸들러는 ID 로 부착되어 이동해도 안전. -->
  <div id="pu-overlay" aria-hidden="true">
    <!-- 상단 배너: 텍스트 + 닫기. 화면 상단에 고정 -->
    <div class="pu-banner">
      <div class="pu-banner-close" id="pu-close">×</div>
      <div class="pu-banner-text" id="pu-text"></div>
    </div>
    <!-- 액션 버튼(마법봉 SHUFFLE 등): 배너와 분리되어 화면 중앙에 별도 표시 -->
    <button class="pu-action-btn" id="pu-action"></button>
    <!-- 대포 마스코트(rainbow 모드 전용): 화면 하단에 표시 -->
    <div id="pu-cannon-mascot"></div>
    <!-- 청소기 사용 이미지(vacuum 모드 전용): 화면 하단-중앙 슬라이드인, 노즐 입구=상단 -->
    <div id="pu-vacuum-img" aria-hidden="true"></div>
  </div>

  <!-- ===== 딤 오버레이들(게임오버/아이템 해금/구매): #fit-root 직속(게임박스 밖)으로 이동.
       transform 걸린 #game-container 안에 두면 position:fixed/absolute 도 박스 기준이라 딤이 레터박스(상하 여백)·HUD·아이템바를 못 덮음(B.5).
       핸들러는 ID 로 부착되어 DOM 이동해도 안전. ===== -->

  <!-- 게임오버 'Out of Space' 팝업 — 좌측 3슬롯을 위로 튕겨 자리 확보 -->
  <div id="over-overlay" aria-hidden="true">
    <div id="over-card" class="pix-card">
      <button id="over-close" class="pix-close" aria-label="Close"></button>
      <div id="over-title" class="pix-title">Out of Space</div>
      <!-- 일러스트: 실제 문어 3-스프링 배치(자산 있으면 이미지, 없으면 아래 도식 폴백) -->
      <div id="over-diagram">
        <img id="over-diagram-img" alt="" aria-hidden="true" />
        <div id="over-diagram-schematic">
          <div class="od-row od-top">
            <div class="od-cell octo"></div><div class="od-cell octo"></div><div class="od-cell octo"></div>
          </div>
          <div class="od-arrow">▲</div>
          <div class="od-row od-bottom">
            <div class="od-cell"></div><div class="od-cell"></div><div class="od-cell"></div><div class="od-cell octo"></div><div class="od-cell octo"></div>
          </div>
        </div>
      </div>
      <div id="over-desc"></div>
      <!-- 하나의 둥근 버튼, 두 영역을 '색'으로만 구분(가운데 분리선 없음): 좌=효과(스프링×3) | 우=비용(코인920) -->
      <button id="over-continue" class="pix-btn">
        <span id="over-spring-row" class="over-half"><span class="over-spring-icon"></span><span id="over-spring-x">×3</span></span>
        <span id="over-cost-row" class="over-half"><span class="over-coin"></span><span id="over-cost">900</span></span>
      </button>
      <button id="over-retry" class="pix-btn">Retry</button>
    </div>
  </div>

  <!-- 아이템 해금 팝업(첫 진입 1회, 무료 1개 지급 안내) -->
  <div id="item-unlock-overlay">
    <div class="iu-card pix-card">
      <div class="iu-new">NEW ITEM!</div>
      <div class="iu-icon-wrap"><div class="iu-glow"></div><img class="iu-icon" alt=""></div>
      <div class="iu-name"></div>
      <div class="iu-desc"></div>
      <div class="iu-free"><span class="iu-gift"></span><span class="iu-free-txt">1 free!</span></div>
      <button class="iu-btn pix-btn">Got it!</button>
    </div>
  </div>

  <!-- 아이템 구매 팝업(단독/릴스 IS_SOLO 전용 — 빈 아이템 탭 시: 인벤 0 + 레벨해금이면 여기서 구매) -->
  <!--   item-unlock 팝업과 동일 아트톤(.iu-card 네이비 + .iu-* 클래스 재사용). 가격행 + Buy/Cancel. -->
  <div id="item-buy-overlay">
    <div class="iu-card ib-card pix-card">
      <button class="ib-x pix-close" aria-label="Close">×</button>
      <div class="iu-icon-wrap"><div class="iu-glow"></div><img class="iu-icon ib-icon" alt=""></div>
      <div class="iu-name ib-name"></div>
      <div class="iu-desc ib-desc"></div>
      <div class="ib-actions">
        <button class="ib-buy pix-btn"><i class="ib-buy-coin"></i><span class="ib-buy-val"></span></button>
      </div>
    </div>
  </div>

  <!-- ===== 뷰포트 기준(게임박스 밖) UI: #fit-root 직속 → 화면 끝/전체뷰포트 기준. 게임플레이 요소는 박스 안에 유지. ===== -->
  <div id="hud-top" data-edit-id="hud-top">
    <div class="coin-pill" data-edit-id="coin-pill"><div class="coin-bg" data-edit-id="coin-bg"></div><span class="coin-icon" data-edit-id="coin-icon"></span><span id="coin-amount" data-edit-id="coin-amount">0</span></div>
    <div class="level-label" id="level-label" data-edit-id="level-label">LEVEL 1</div>
    <button id="stage-prev" class="stage-nav" data-edit-id="stage-prev" aria-label="Prev stage">&#9664;</button>
    <button id="stage-next" class="stage-nav" data-edit-id="stage-next" aria-label="Next stage">&#9654;</button>
  </div>
  <!-- 처음부터 재시작 버튼(스테이지/파워업 모두 초기화) -->
  <button id="settings-btn" data-edit-id="settings-btn" aria-label="Settings"></button>
  <div id="settings-overlay" aria-hidden="true">
    <div class="settings-card pix-card">
      <button class="settings-close pix-close" id="settings-close" aria-label="Close"></button>
      <div class="settings-title pix-title">Setting</div>
      <div class="settings-row"><span class="settings-label">Effect</span>
        <button class="settings-toggle on" id="sfx-toggle" aria-label="Sound effects on/off"><span class="knob"></span></button></div>
      <div class="settings-row"><span class="settings-label">BGM</span>
        <button class="settings-toggle on" id="bgm-toggle" aria-label="Background music on/off"><span class="knob"></span></button></div>
      <div class="settings-row"><span class="settings-label">Haptic</span>
        <button class="settings-toggle on" id="haptic-toggle" aria-label="Haptic on/off"><span class="knob"></span></button></div>
      <!-- [제거] Test(DEV) 토글 UI 삭제(사용자 요청 — 본게임 설정에서 안 보이게). cb_testmode 게이트 로직(readTestMode/setTestMode·?dev/?admin)은 유지. -->
      <button class="settings-home-btn pix-btn" id="settings-home">HOME</button>
    </div>
  </div>
  <!-- 🧪 TESTER (DEV-ONLY): __TEST_INFINITE_PU 에서만 노출. 일반 릴리스 빌드(TEST_ALL_PU=false)에선 숨김. -->
  <button id="tester-btn" aria-label="Gimmick tester">🧪</button>
  <div id="tester-overlay" aria-hidden="true">
    <div class="tester-card">
      <div class="tester-title">🧪 Gimmick Tester</div>
      <div class="tester-sub">DEV ONLY · tap a demo to load a clearable showcase board</div>
      <div id="tester-list"><!-- DEMO_STAGES 레지스트리에서 JS가 버튼을 채운다 --></div>
      <button class="tester-close" id="tester-close">Close</button>
    </div>
  </div>
  <!-- ✨ NEW ITEM 튜토리얼 팝업: 새 기믹이 처음 등장하기 직전(디오라마 제작 → 다음 인게임 사이) 1회 노출.
       딤 위에 yellow "New Item" 헤더 + 어두운 카드(기믹 실제 룩 캔버스) + 이름+"Unlocked!" + 한 줄 설명 + "TAP TO CONTINUE".
       탭하면 다음 튜토리얼(큐) 또는 인게임 진입. 본 것은 localStorage 'cb_tut_seen' 에 영속. -->
  <div id="tut-overlay" aria-hidden="true">
    <div id="tut-header">New Item</div>
    <div id="tut-card" class="pix-card">
      <div id="tut-visual"><canvas id="tut-canvas" width="300" height="300"></canvas><video id="tut-vid" autoplay loop muted playsinline preload="auto"></video><img id="tut-ill" alt=""></div>
      <div id="tut-name"><span id="tut-name-text">Item</span> <span class="tut-unlocked">Unlocked!</span></div>
      <div id="tut-desc">Description.</div>
    </div>
    <div id="tut-tap">TAP TO CONTINUE</div>
  </div>
  <div id="clear-overlay">
    <div id="clear-confetti"></div>
    <div id="clear-title" data-edit-id="clear-title">Well Done!</div>
    <div id="clear-footer">
      <div id="clear-blocks" data-edit-id="clear-blocks"><span class="block-bigicon" data-edit-id="clear-block-icon"></span><span class="block-val" id="clear-block-val" data-edit-id="clear-block-val">+0</span></div>
      <div id="clear-coin" data-edit-id="clear-coin"><span class="coin-bigicon" data-edit-id="clear-coin-icon"></span><span class="coin-val" id="clear-coin-val" data-edit-id="clear-coin-val">+0</span></div>
      <div id="clear-tap" data-edit-id="clear-tap">Tap to Next Stage</div>
    </div>
  </div>
</div><!-- /#fit-root -->
<!-- 온보딩 오버레이는 fit-root(트랜스폼) 밖 = 뷰포트 고정 → getBoundingClientRect(뷰포트 px)로 문어에 정확히 정렬 -->
<div id="ob-overlay" aria-hidden="true">
  <div id="ob-text"></div>
  <div id="ob-tap"><span class="hand"></span></div>
  <div id="ob-swipe"><span class="hand"></span></div>
</div>
<!-- ODG_REGION_END: markup -->

<script src="./js/10_cb_meta.js"></script>

<script src="./js/11_game.js"></script>
<!-- ODG_REGION_END: game-logic -->
<script src="./js/12_game.js"></script>
<script src="./js/13_game_audio.js"></script>
</body>
